project:
  name: agent-bridge
  mode: standalone
  workspace_dir: workspace
  portable_dir: .agent-bridge

limits:
  idle_seconds: 10
  max_cycles: 5
  max_runtime_seconds: 3600
  polling_interval_seconds: 15

apps:
  local_agent:
    app_name: "Codex"
    submit_key: "enter"

  pm_assistant:
    app_name: "Google Chrome"
    submit_key: "enter"

github:
  owner: ""
  repo: ""
  default_pr: null
  reviewer_keywords:
    - "codex"
    - "openai"
    - "automated review"

safety:
  hard_stop_keywords:
    - NEEDS_USER_DECISION
    - APPROVAL_REQUIRED
    - RISK_HIGH
    - PAID_API
    - LICENSE_UNKNOWN
    - PRIVACY_RISK
    - MAIN_MERGE
    - DATA_MIGRATION
    - ARCHITECTURE_CHANGE
    - DELETE_OR_REWRITE_LARGE_SCOPE
    - CI_FAILED_REPEATEDLY
    - MAX_CYCLE_REACHED
